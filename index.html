<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 My To-Do Tracker</title>
<style>

  body{font-family:'Sarabun',sans-serif;background:#F0F4FF;min-height:100vh;color:#1e2761}

  .app{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;background:#fff;box-shadow:0 0 40px rgba(30,39,97,.08)}

  .bottomnav{display:flex;background:#fff;border-top:1px solid #CBD5E1;flex-shrink:0}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:#64748B;font-family:'Sarabun',sans-serif;font-size:11px;transition:.2s;position:relative}
  .nav-item.active{color:var(--navy)}
  .nav-item.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--navy);border-radius:0 0 4px 4px}
  .nav-icon{font-size:20px;line-height:1}
  .card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(30,39,97,.07);margin-bottom:12px}
  .section-label{font-size:13px;font-weight:600;color:#64748B;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:#F1F5F9;border-radius:12px;padding:12px 10px;text-align:center}
  .kpi-num{font-size:28px;font-weight:700;color:var(--navy);line-height:1}
  .kpi-lbl{font-size:10px;color:#64748B;margin-top:3px}
  .donuts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .donut-card{background:#F1F5F9;border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px}

  .donut-sub{font-size:10px;color:#64748B}
  .donut-title{font-size:12px;font-weight:600;color:var(--navy);text-align:center}
  .cat-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .cat-icon{font-size:18px;width:28px;text-align:center}
  .cat-info{flex:1}
  .cat-name{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:3px}
  .cat-bar-bg{height:7px;background:#CBD5E1;border-radius:100px;overflow:hidden}
  .cat-bar-fill{height:100%;border-radius:100px;transition:width .8s cubic-bezier(.4,0,.2,1)}
  .cat-count{font-size:11px;color:#64748B;white-space:nowrap;min-width:40px;text-align:right}
  .task-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#fff;border-radius:12px;border:1.5px solid #CBD5E1;margin-bottom:8px;cursor:pointer;transition:.15s}
  .task-item:hover{border-color:#a5b4fc;box-shadow:0 2px 8px rgba(30,39,97,.06)}
  .task-item.done{opacity:.55}
  .task-check{width:22px;height:22px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:13px}
  .task-check.checked{border-color:#22C55E;background:#22C55E;color:#fff}
  .task-body{flex:1;min-width:0}
  .task-title{font-size:13px;font-weight:500;color:#1e2761;margin-bottom:4px;word-break:break-word}
  .task-item.done .task-title{text-decoration:line-through;color:#64748B}
  .task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .task-date{font-size:11px;color:#64748B}
  .cat-chip{font-size:10px;font-weight:600;padding:1px 6px;border-radius:100px}
  .pri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .task-actions{display:flex;gap:4px}
  .btn-icon{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:#64748B;font-size:14px;transition:.2s}
  .btn-icon:hover{background:#F1F5F9;color:var(--navy)}
  .filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
  .filter-row::-webkit-scrollbar{display:none}
  .chip{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;border:1.5px solid #CBD5E1;background:#fff;color:#64748B;cursor:pointer;white-space:nowrap;transition:.15s;font-family:'Sarabun',sans-serif}
  .chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:600px){.overlay{align-items:center}}
  .modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 32px;width:100%;max-width:500px;animation:slideUp .25s ease}
  @media(min-width:600px){.modal{border-radius:20px;padding:28px;animation:fadeIn .2s ease}}
  @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
  .modal-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:600;color:#64748B;margin-bottom:5px;display:block}
  .form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1.5px solid #CBD5E1;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--navy);outline:none;transition:.2s}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  .form-textarea{resize:none;height:70px}
  .cat-picker{display:flex;gap:6px;flex-wrap:wrap}
  .cat-btn{padding:6px 12px;border-radius:100px;border:2px solid #CBD5E1;background:#fff;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
  .cat-btn.sel{color:#fff}
  .btn-submit{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px}
  .btn-submit:hover{background:#2d3ea8}
  .btn-close{background:#F1F5F9;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#64748B}
  .empty{text-align:center;padding:40px 20px;color:#64748B}
  .empty-icon{font-size:44px;margin-bottom:10px}
  .empty-text{font-size:14px}
  .today-banner{background:linear-gradient(135deg,#1E2761 0%,#3b52d4 100%);border-radius:16px;padding:16px 18px;color:#fff;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .today-greeting{font-size:16px;font-weight:700}
  .today-sub{font-size:12px;opacity:.75;margin-top:2px}
  .today-stat{text-align:center}
  .today-stat-num{font-size:30px;font-weight:800;line-height:1}
  .today-stat-lbl{font-size:11px;opacity:.75}
  .pct-bar{height:4px;background:#CBD5E1;border-radius:100px;margin-top:5px;overflow:hidden}
  .pct-fill{height:100%;border-radius:100px;background:#6366f1;transition:width .5s ease}
  .content::-webkit-scrollbar{width:4px}
  .content::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
  .add-fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;background:var(--navy);color:#fff;border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(30,39,97,.3);display:none;align-items:center;justify-content:center;z-index:50}
</style>
